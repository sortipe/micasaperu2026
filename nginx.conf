server {
    listen 80;
    server_name micasaperu.com www.micasaperu.com;
    root /usr/share/nginx/html;
    index index.html;

    charset utf-8;

    # ============================================================
    # SECURITY HEADERS — Hardened for A+ on securityheaders.com
    # ============================================================

    # HSTS: 2 years, include subdomains, preload
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Anti-clickjacking
    add_header X-Frame-Options "DENY" always;

    # Prevent MIME sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # Referrer policy
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Permissions Policy — disable all non-essential features
    add_header Permissions-Policy "accelerometer=(), ambient-light-sensor=(), autoplay=(), battery=(), camera=(), display-capture=(), document-domain=(), encrypted-media=(), fullscreen=(self), geolocation=(self), gyroscope=(), magnetometer=(), microphone=(), midi=(), payment=(self), picture-in-picture=(), publickey-credentials-get=(), screen-wake-lock=(), usb=(), web-share=(), xr-spatial-tracking=()" always;

    # Content Security Policy — strict whitelist
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://challenges.cloudflare.com https://sdk.mercadopago.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https://*.supabase.co https://images.unsplash.com https://ui-avatars.com https://*.basemaps.cartocdn.com https://*.google.com https://*.googleapis.com https://*.tile.openstreetmap.org https://*.tile.openstreetmap.de; media-src 'self' blob:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://api.mercadopago.com https://nominatim.openstreetmap.org https://tile.openstreetmap.org; frame-src 'self' https://challenges.cloudflare.com https://www.mercadopago.com; object-src 'none'; frame-ancestors 'none'; worker-src 'self' blob:; manifest-src 'self'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests;" always;

    # Cross-Origin isolation
    add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
    add_header Cross-Origin-Resource-Policy "cross-origin" always;

    # Legacy headers
    add_header X-Permitted-Cross-Domain-Policies "none" always;
    add_header X-Robots-Tag "index, follow" always;
    add_header X-DNS-Prefetch-Control "on" always;

    # Hide Nginx version
    server_tokens off;

    # ETag support
    etag on;
    if_modified_since exact;

    # Brotli compression
    brotli on;
    brotli_comp_level 6;
    brotli_buffers 16 8k;
    brotli_min_length 20;
    brotli_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml application/octet-stream application/wasm font/ttf font/otf font/woff font/woff2 image/webp image/avif;

    # Gzip fallback
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml application/octet-stream application/wasm font/ttf font/otf font/woff font/woff2;
    gzip_disable "msie6";

    # MIME types
    types {
        text/html                   html htm shtml;
        text/css                    css;
        text/xml                    xml;
        image/gif                   gif;
        image/jpeg                  jpeg jpg;
        application/javascript      js mjs;
        application/json            json;
        image/png                   png;
        image/svg+xml               svg svgz;
        image/webp                  webp;
        image/avif                  avif;
        application/octet-stream    wasm;
        font/woff                   woff;
        font/woff2                  woff2;
        font/ttf                    ttf;
        font/otf                    otf;
        application/wasm            wasm;
    }

    # Static assets with immutable cache
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        open_file_cache max=1000 inactive=20s;
        open_file_cache_valid 30s;
        open_file_cache_min_uses 2;
        open_file_cache_errors on;
    }

    location ~* \.(?:js|mjs)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~* \.(?:css)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~* \.(?:jpg|jpeg|gif|png|ico|cur|gz|svg|svgz|mp4|ogg|ogv|webp|avif|webm|htc|woff2?|eot|ttf|otf|wasm)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /favicon.ico {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /og-image.jpg {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /robots.txt {
        expires 1d;
        add_header Cache-Control "public, max-age=86400, stale-while-revalidate=604800";
        access_log off;
    }

    location /sitemap.xml {
        expires 1h;
        add_header Cache-Control "public, max-age=3600, stale-while-revalidate=86400";
        access_log off;
    }

    location /manifest.json {
        expires 1h;
        add_header Cache-Control "public";
        access_log off;
    }

    # SPA fallback - CDN cache for SSR, stale-while-revalidate for instant back/forward
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, must-revalidate, stale-while-revalidate=86400";
        add_header Cache-Tag "spa-fallback";
        expires -1;
    }

    # Deny hidden files and sensitive paths
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ /\.(env|git|htaccess|gitignore|docker|npmrc|nvmrc) {
        deny all;
        access_log off;
    }

    location ~* (?:\.env|\.git/|\.htaccess|composer\.json|package-lock\.json|yarn\.lock|tsconfig\.json|vite\.config) {
        deny all;
        access_log off;
    }

    # PHP files don't exist (SPA-only) - return 404 naturally
    location ~ \.php$ {
        return 404;
    }

    # Block access to specific sensitive paths
    location ~ ^/(api/|node_modules|vendor|scratch|backups) {
        deny all;
        access_log off;
    }

    # Limit request rate to prevent abuse
    limit_req_zone $binary_remote_addr zone=login:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=api:10m rate=100r/m;
    limit_req_zone $binary_remote_addr zone=general:10m rate=500r/m;

    # Optimize buffer sizes for security (prevent buffer overflow attacks)
    client_body_buffer_size 8K;
    client_header_buffer_size 1k;
    client_max_body_size 8m;
    large_client_header_buffers 2 1k;
    client_body_timeout 10s;
    client_header_timeout 10s;
    send_timeout 10s;

    # Disable access logs for static files (keep error logs)
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;
}
