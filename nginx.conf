server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    charset utf-8;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://challenges.cloudflare.com https://sdk.mercadopago.com; connect-src 'self' https://uxdnhmkoiqqeiaoxeedw.supabase.co https://api.mercadopago.com https://nominatim.openstreetmap.org; img-src 'self' data: blob: https://uxdnhmkoiqqeiaoxeedw.supabase.co https://images.unsplash.com https://ui-avatars.com https://*.basemaps.cartocdn.com https://*.google.com https://*.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; frame-src 'self' https://challenges.cloudflare.com https://www.mercadopago.com; frame-ancestors 'none'; form-action 'self'; base-uri 'self';" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;

    # Brotli compression (requires ngx_brotli module)
    brotli on;
    brotli_comp_level 6;
    brotli_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml application/octet-stream;

    # Gzip fallback
    gzip on;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_vary on;

    # Static assets with immutable cache (fingerprinted by Vite)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Cache Vite-generated files by content hash
    location ~* \.(?:js|mjs|jsx|ts|tsx)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~* \.(?:css|scss)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /favicon.ico {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~* \.(?:jpg|jpeg|gif|png|ico|cur|gz|svg|svgz|mp4|ogg|ogv|webp|avif|webm|htc)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /og-image.jpg {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /robots.txt {
        expires 1d;
        add_header Cache-Control "public";
        access_log off;
    }

    location /manifest.json {
        expires 1h;
        add_header Cache-Control "public";
        access_log off;
    }

    # SPA fallback with HTML caching disabled for fresh content
    location / {
        try_files $uri $uri/ /index.html;
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Deny hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ /\.(env|git|htaccess) {
        deny all;
        access_log off;
    }

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;
}
