name: Enterprise CI/CD Pipeline - DevOps & Quality Automation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  NODE_OPTIONS: '--max-old-space-size=4096'

jobs:
  dependency-review:
    name: 🔎 Revisión de Dependencias
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    if: github.event_name == 'pull_request'
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Dependency Review
      uses: actions/dependency-review-action@v4
      with:
        fail-on-severity: high

  static-analysis:
    name: 🔍 Análisis Estático y Tipado (TS)
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: TypeScript Type Check
      run: npm run lint

  security-audit:
    name: 🛡️ Auditoría de Seguridad
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: npm Audit
      run: npm audit --audit-level=moderate || true

    - name: Trivy Scan (fs)
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        exit-code: '1'
        ignore-unfixed: true
        severity: 'HIGH,CRITICAL'
        skip-dirs: 'node_modules'

  build-spa:
    name: 📦 Build Vite
    runs-on: ubuntu-latest
    needs: static-analysis
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Build SPA
      run: npm run build

    - name: Check Bundle Size
      run: |
        npx bundlesize2 --threshold=700KB dist/assets/index-*.js
      continue-on-error: true

    - name: Smoke Test
      run: bash .github/scripts/smoke-test.sh
      env:
        DIST_DIR: dist

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist/
        retention-days: 3

  deploy-vercel:
    name: 🚀 Deploy a Vercel
    runs-on: ubuntu-latest
    needs: build-spa
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
    - name: Deploy to Vercel
      uses: amondnet/vercel-action@v25
      with:
        vercel-token: ${{ secrets.VERCEL_TOKEN }}
        vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
        vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
        vercel-args: '--prod'

    - name: Health Check Post-Deploy
      run: |
        sleep 10
        curl -sSf -o /dev/null -w "%{http_code}" "https://micasaperu.pe" || echo "⚠️ Health check falló"
      continue-on-error: true

  notify-failure:
    name: 🔔 Notificar fallo
    runs-on: ubuntu-latest
    needs: [build-spa, docker-validation]
    if: failure() && github.event_name == 'push'
    steps:
    - name: Notificar por Discord
      uses: sarisia/actions-status-discord@v1
      with:
        webhook: ${{ secrets.DISCORD_WEBHOOK }}
        status: failure
        title: "❌ Falló el despliegue de micasaperu.pe"
        description: |
          **Commit:** ${{ github.sha }}
          **Rama:** ${{ github.ref }}
          **Autor:** ${{ github.triggering_actor }}
          **URL:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      continue-on-error: true

    - name: Notificar por correo (SendGrid)
      if: ${{ secrets.SENDGRID_API_KEY != '' }}
      uses: sendgrid/sendgrid-action@v1
      with:
        api-key: ${{ secrets.SENDGRID_API_KEY }}
        to: ${{ secrets.ALERT_EMAIL }}
        from: alerts@micasaperu.pe
        subject: "❌ Falló el deploy de micasaperu.pe"
        content: |
          El pipeline de CI/CD falló.
          Commit: ${{ github.sha }}
          Revisa: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      continue-on-error: true

  docker-validation:
    name: 🐳 Docker Build + Trivy
    runs-on: ubuntu-latest
    needs: build-spa
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: false
        tags: micasaperu:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Trivy Scan (image)
      if: always()
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'image'
        image-ref: 'micasaperu:${{ github.sha }}'
        exit-code: '1'
        ignore-unfixed: true
        severity: 'HIGH,CRITICAL'
