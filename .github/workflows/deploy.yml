name: Enterprise CI/CD Pipeline - DevOps & Quality Automation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  NODE_OPTIONS: '--max-old-space-size=4096'

jobs:
  dependency-review:
    name: 🔎 Revisión de Dependencias
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    if: github.event_name == 'pull_request'
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Dependency Review
      uses: actions/dependency-review-action@v4
      with:
        fail-on-severity: high

  static-analysis:
    name: 🔍 Análisis Estático y Tipado (TS)
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: TypeScript Type Check
      run: npm run lint

  security-audit:
    name: 🛡️ Auditoría de Seguridad
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: npm Audit
      run: npm audit --audit-level=moderate || true

    - name: Trivy Scan (fs)
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        exit-code: '1'
        ignore-unfixed: true
        severity: 'HIGH,CRITICAL'
        skip-dirs: 'node_modules'

  build-spa:
    name: 📦 Build Vite
    runs-on: ubuntu-latest
    needs: static-analysis
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Build SPA
      run: npm run build

    - name: Check Bundle Size
      run: |
        npx bundlesize2 --threshold=700KB dist/assets/index-*.js
      continue-on-error: true

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist/
        retention-days: 3

  docker-validation:
    name: 🐳 Docker Build + Trivy
    runs-on: ubuntu-latest
    needs: build-spa
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: false
        tags: micasaperu:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Trivy Scan (image)
      if: always()
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'image'
        image-ref: 'micasaperu:${{ github.sha }}'
        exit-code: '1'
        ignore-unfixed: true
        severity: 'HIGH,CRITICAL'
